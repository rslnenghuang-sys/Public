<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>碳帶速查工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 20px; }
    h2 { color: #0066cc; }
    label { display: block; margin-top: 10px; }
    select, button { margin-top: 5px; font-size: 16px; }
    #result { margin-top: 20px; font-weight: bold; color: #0066cc; }
    optgroup { font-weight: bold; }
  </style>
</head>
<body>
  <h2>碳帶寬度 ↔ 標籤寬度(點數)設定值速查</h2>

  <label>選擇碳帶寬度 (mm):</label>
  <select id="width">
    <optgroup label="常見規格">
      <option value="60">60 mm</option>
      <option value="80">80 mm</option>
      <option value="110">110 mm</option>
      <option value="140">140 mm</option>
      <option value="160">160 mm</option>
    </optgroup>
    <optgroup label="特殊規格">
      <option value="51">51 mm (最小)</option>
      <option value="100">100 mm</option>
      <option value="120">120 mm</option>
      <option value="150">150 mm</option>
      <option value="168">168 mm (最大列印寬度)</option>
      <option value="170">170 mm (碳帶最大寬度)</option>
    </optgroup>
  </select>

  <label>選擇解析度:</label>
  <select id="dpi">
    <option value="200">200 dpi</option>
    <option value="300">300 dpi</option>
  </select>

  <button onclick="calculate()">查詢</button>

  <div id="result"></div>

  <script>
    function calculate() {
      let mm = parseFloat(document.getElementById("width").value);
      let dpi = parseInt(document.getElementById("dpi").value);

      let dots = (mm / 25.4) * dpi;
      let maxDots = dpi === 200 ? 1323 : 1980;
      if (dots > maxDots) dots = maxDots;

      document.getElementById("result").innerText =
        "碳帶寬度: " + mm + " mm → 建議設定值: " + Math.round(dots) + " dots (上限 " + maxDots + ")";
    }
  </script>
</body>
</html>
